openapi: 3.0.0
info:
  title: Aidentally API Documentation
  version: 1.0.0
  description: API documentation for Aidentally application

servers:
  - url: http://localhost:6768
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication

  schemas:
    User:
      type: object
      required:
        - uuid
        - username
        - status
        - created_at
        - updated_at
      properties:
        uuid:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
          minLength: 1
        status:
          type: number
        address:
          type: string
        phone_number:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: johndoe
        password:
          type: string
          format: password
          minLength: 6
          example: password123

    Tokens:
      type: object
      required:
        - access
        - refresh
      properties:
        access:
          type: object
          required:
            - token
            - expires
            - type
          properties:
            token:
              type: string
            expires:
              type: string
              format: date-time
            type:
              type: string
              enum: [access]
        refresh:
          type: object
          required:
            - token
            - expires
            - type
          properties:
            token:
              type: string
            expires:
              type: string
              format: date-time
            type:
              type: string
              enum: [refresh]

    ApiResponse:
      type: object
      required:
        - success
        - code
        - message
      properties:
        success:
          type: boolean
        code:
          type: number
        message:
          type: string
        data:
          type: object
        error:
          type: object
          properties:
            code:
              type: number
            message:
              type: string
            name:
              type: string
            isOperational:
              type: boolean

    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - user
                - tokens
              properties:
                user:
                  $ref: '#/components/schemas/User'
                tokens:
                  $ref: '#/components/schemas/Tokens'

    RegisterResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - user
                - tokens
              properties:
                user:
                  $ref: '#/components/schemas/User'
                tokens:
                  $ref: '#/components/schemas/Tokens'

    RefreshTokenResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Tokens'

    ChangePasswordRequest:
      type: object
      required:
        - old_password
        - password
        - confirm_password
      properties:
        old_password:
          type: string
          format: password
          minLength: 6
        password:
          type: string
          format: password
          minLength: 6
        confirm_password:
          type: string
          format: password
          minLength: 6

    CheckEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          minLength: 1
          description: JWT refresh token

    UserCreateRequest:
      type: object
      required:
        - username
        - password
        - confirm_password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
          minLength: 6
        confirm_password:
          type: string
          format: password
          minLength: 6
        display_name:
          type: string
          minLength: 1

    LogoutRequest:
      type: object
      required:
        - access_token
        - refresh_token
      properties:
        access_token:
          type: string
          minLength: 1
          description: JWT access token to invalidate
        refresh_token:
          type: string
          minLength: 1
          description: JWT refresh token to invalidate

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message
        code:
          type: string
          description: Error code

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Create a new user account
      description: Register a new user and return authentication tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /auth/email-exists:
    post:
      tags:
        - Auth
      summary: Check if username exists
      description: Verify if a username is already registered
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckUsernameRequest'
      responses:
        '200':
          description: Email check completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user with email and password
      description: Returns user details and JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /auth/refresh-token:
    post:
      tags:
        - Auth
      summary: Get new access token
      description: Generate new access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New tokens generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout user
      description: Invalidate user's session and refresh token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/change-password:
    put:
      tags:
        - Auth
      summary: Change user password
      description: Update user's password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password changed successfully
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse' 