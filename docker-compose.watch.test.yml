services:
  test:
    image: node:18-alpine
    container_name: test
    working_dir: /app
    command: sh -c "npm install pnpm -g && pnpm install && pnpm run test:watch"
    depends_on:
      - test-db
      - test-redis
    env_file:
      - .env
    volumes:
      - ./coverage:/app/coverage
      - .:/app
      - /app/node_modules

  test-db:
    image: mysql:8.0
    container_name: test-db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS}
      - MYSQL_DATABASE=${DB_NAME}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-redis:
    image: redis:7-alpine
    container_name: test-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  node_modules: